name: Auto PR To Main

on:
  push:
    branches:
      - market-analysis
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-or-update-pr:
    runs-on: ubuntu-latest
    env:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    steps:
      - name: Create or update pull request (PAT)
        id: create_pr_pat
        if: ${{ env.PAT_TOKEN != '' }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headBranch = "market-analysis";
            const baseBranch = "main";
            const title = "Auto PR: market-analysis -> main";
            const body = [
              "This pull request is managed automatically by `.github/workflows/auto-pr-to-main.yml`.",
              "",
              `Source branch: \`${headBranch}\``,
              `Target branch: \`${baseBranch}\``,
              `Last commit: \`${context.sha}\``
            ].join("\n");

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              head: `${owner}:${headBranch}`,
              base: baseBranch,
              per_page: 100
            });

            if (openPulls.length > 0) {
              const existing = openPulls[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: existing.number,
                title,
                body
              });
              core.info(`Updated existing PR #${existing.number}`);
              core.setOutput("pr_number", String(existing.number));
              core.setOutput("pr_url", existing.html_url);
              return;
            }

            try {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                title,
                head: headBranch,
                base: baseBranch,
                body,
                maintainer_can_modify: true
              });
              core.info(`Created PR #${created.data.number}: ${created.data.html_url}`);
              core.setOutput("pr_number", String(created.data.number));
              core.setOutput("pr_url", created.data.html_url);
            } catch (error) {
              const message = String(error?.message || "");
              const noDiff = error?.status === 422 && message.includes("No commits between");
              if (noDiff) {
                core.info("No commits between source and target branches. Nothing to open.");
                core.setOutput("pr_number", "");
                core.setOutput("pr_url", "");
                return;
              }
              throw error;
            }

      - name: Create or update pull request (GITHUB_TOKEN fallback)
        id: create_pr_github_token
        if: ${{ env.PAT_TOKEN == '' || steps.create_pr_pat.outcome != 'success' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headBranch = "market-analysis";
            const baseBranch = "main";
            const title = "Auto PR: market-analysis -> main";
            const body = [
              "This pull request is managed automatically by `.github/workflows/auto-pr-to-main.yml`.",
              "",
              `Source branch: \`${headBranch}\``,
              `Target branch: \`${baseBranch}\``,
              `Last commit: \`${context.sha}\``
            ].join("\n");

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              head: `${owner}:${headBranch}`,
              base: baseBranch,
              per_page: 100
            });

            if (openPulls.length > 0) {
              const existing = openPulls[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: existing.number,
                title,
                body
              });
              core.info(`Updated existing PR #${existing.number}`);
              core.setOutput("pr_number", String(existing.number));
              core.setOutput("pr_url", existing.html_url);
              return;
            }

            try {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                title,
                head: headBranch,
                base: baseBranch,
                body,
                maintainer_can_modify: true
              });
              core.info(`Created PR #${created.data.number}: ${created.data.html_url}`);
              core.setOutput("pr_number", String(created.data.number));
              core.setOutput("pr_url", created.data.html_url);
            } catch (error) {
              const message = String(error?.message || "");
              const noDiff = error?.status === 422 && message.includes("No commits between");
              if (noDiff) {
                core.info("No commits between source and target branches. Nothing to open.");
                core.setOutput("pr_number", "");
                core.setOutput("pr_url", "");
                return;
              }
              throw error;
            }

      - name: Enable auto-merge on PR (PAT)
        if: ${{ env.PAT_TOKEN != '' && steps.create_pr_pat.outcome == 'success' && steps.create_pr_pat.outputs.pr_number != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number("${{ steps.create_pr_pat.outputs.pr_number }}");

            const data = await github.graphql(
              `query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    id
                    number
                    state
                    isDraft
                    autoMergeRequest {
                      enabledAt
                    }
                  }
                }
              }`,
              { owner, repo, number: prNumber }
            );

            const pr = data?.repository?.pullRequest;
            if (!pr) {
              core.warning(`PR #${prNumber} was not found. Skipping auto-merge setup.`);
              return;
            }
            if (pr.state !== "OPEN") {
              core.info(`PR #${pr.number} is not open (state: ${pr.state}). Skipping auto-merge.`);
              return;
            }
            if (pr.isDraft) {
              core.info(`PR #${pr.number} is a draft. Skipping auto-merge.`);
              return;
            }
            if (pr.autoMergeRequest) {
              core.info(`Auto-merge is already enabled for PR #${pr.number}.`);
              return;
            }

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                    pullRequest {
                      number
                    }
                  }
                }`,
                { pullRequestId: pr.id }
              );
              core.info(`Enabled auto-merge for PR #${pr.number}.`);
            } catch (error) {
              core.setFailed(
                `Could not enable auto-merge for PR #${pr.number}. Ensure repository setting 'Allow auto-merge' is enabled. Details: ${error.message}`
              );
            }

      - name: Enable auto-merge on PR (GITHUB_TOKEN fallback)
        if: ${{ (env.PAT_TOKEN == '' || steps.create_pr_pat.outcome != 'success') && steps.create_pr_github_token.outcome == 'success' && steps.create_pr_github_token.outputs.pr_number != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number("${{ steps.create_pr_github_token.outputs.pr_number }}");

            const data = await github.graphql(
              `query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    id
                    number
                    state
                    isDraft
                    autoMergeRequest {
                      enabledAt
                    }
                  }
                }
              }`,
              { owner, repo, number: prNumber }
            );

            const pr = data?.repository?.pullRequest;
            if (!pr) {
              core.warning(`PR #${prNumber} was not found. Skipping auto-merge setup.`);
              return;
            }
            if (pr.state !== "OPEN") {
              core.info(`PR #${pr.number} is not open (state: ${pr.state}). Skipping auto-merge.`);
              return;
            }
            if (pr.isDraft) {
              core.info(`PR #${pr.number} is a draft. Skipping auto-merge.`);
              return;
            }
            if (pr.autoMergeRequest) {
              core.info(`Auto-merge is already enabled for PR #${pr.number}.`);
              return;
            }

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                    pullRequest {
                      number
                    }
                  }
                }`,
                { pullRequestId: pr.id }
              );
              core.info(`Enabled auto-merge for PR #${pr.number}.`);
            } catch (error) {
              core.setFailed(
                `Could not enable auto-merge for PR #${pr.number}. Ensure repository setting 'Allow auto-merge' is enabled. Details: ${error.message}`
              );
            }
