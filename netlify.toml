[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/account"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/account/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/u/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/opportunities"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/opportunities/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/pricing/*"
  to = "/index.html"
  status = 200
